<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestion des Zones</title>
    <link rel="icon" type="image/x-icon" href="/img/logo/logo1.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/custom.css}"/>
</head>
<body>
<div th:replace="fragments :: header"></div>

<!-- Inclusion de la navbar -->
<div th:replace="~{fragments :: navbar}"></div>

<!-- Overlay pour fermer la sidebar -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div th:fragment="content">
    <main class="py-5">
        <div class="container">
            <h1 class="mb-5 text-center">Gestionnaire des Zones</h1>
<!--            <p>Nombre de Zones : <span th:text="${zones.size()}"></span></p>-->
            <p th:text="'Nombre de zones : ' + (${zones} != null ? ${zones.size()} : 0)">Nombre de zones</p>
            <a href="" class="btn btn-success" > +zone</a>
            <table class="table table-striped table-bordered">
                <thead>
                <tr>
                    <th>id</th>
                    <th>nom</th>
                    <th>expZone</th>
                    <th>especeMonstres</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="zone : ${zones}">
                    <td th:text="${zone.id}"></td>
                    <td th:text="${zone.nom}"></td>
                    <td th:text="${zone.expZone}"></td>
                    <!-- TODO faire apparaitre les especes de la zone -->
                    <td>
                    <span th:each="espece, iterStat : ${zone.especeMonstres}"
                          th:text="${espece.nom} + (iterStat.last ? '' : ', ')"></span>
                    </td>
                    <td>
                        <a th:href="@{/zones/{id}(id=${zone.id})}" class="btn btn-primary">Afficher</a>
                        <a th:href="@{/zones/edit/{id}(id=${zone.id})}" class="btn btn-warning">Modifier</a>
                    </td>
                </tr>

                </tbody>
            </table>
        </div>
    </main>
</div>
<footer th:replace="fragments :: footer"></footer>

<!-- Script pour la sidebar -->
<th:block th:replace="~{fragments :: scripts}"></th:block>

</body>
</html>
