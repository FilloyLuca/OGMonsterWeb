<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestion des MonsterKubes</title>
    <link rel="icon" type="image/x-icon" href="/img/logo/logo1.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/custom.css}"/>
</head>
<body>
<div th:replace="fragments :: header"></div>

<!-- Inclusion de la navbar -->
<div th:replace="~{fragments :: navbar}"></div>

<!-- Overlay pour fermer la sidebar -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>


<div th:fragment="content">
    <main class="py-5">
        <div class="container">
            <h1 class="mb-5 text-center">Gestionnaire des MonsterKubes</h1>
<!--            <p>Nombre de MonsterKubes : <span th:text="${monsterKube.size()}"></span></p>-->
            <p th:text="'Nombre de MonstersKube : ' + (${monsterKube} != null ? ${monsterKube.size()} : 0)">Nombre de MonsterKube</p>
            <a href="" class="btn btn-success" > +MonsterKube</a>
            <table class="table table-striped table-bordered">
                <thead>
                <tr>
                    <th>id</th>
                    <th>nom</th>
                    <th>description</th>
                    <th>chance de capture</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="monsterKube : ${monsterKube}">
                    <td th:text="${monsterKube.id}"></td>
                    <td th:text="${monsterKube.nom}"></td>
                    <td th:text="${monsterKube.description}"></td>
                    <td th:text="${monsterKube.chanceCapture + ' %'}"></td>
                    <td>
                        <a href="" class="btn btn-primary"> Afficher</a>
                        <a href="" class="btn btn-warning"> Modifier</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<footer th:replace="fragments :: footer"></footer>

<!-- Script pour la sidebar -->
<th:block th:replace="~{fragments :: scripts}"></th:block>
</body>
</html>
